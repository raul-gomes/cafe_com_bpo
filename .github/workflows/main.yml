name: CI/CD Pipeline

on:
  push:
    branches: ["**"]  # Roda em TODAS as branches
  pull_request:
    branches: ["main"]

jobs:
  # ────────────────────────────────────────────
  # CI: Backend
  # ────────────────────────────────────────────
  backend-ci:
    name: Backend Lint + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint — ruff check
        run: ruff check .

      - name: Lint — ruff format
        run: ruff format --check .

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET: "test-secret-key-at-least-32-chars-long"
          JWT_ALGORITHM: "HS256"
          MODE: "test"
          GOOGLE_CLIENT_ID: "dummy"
          GOOGLE_CLIENT_SECRET: "dummy"
          OAUTH_REDIRECT_URI: "http://localhost:8000/auth"
        run: pytest

  # ────────────────────────────────────────────
  # CI: Frontend
  # ────────────────────────────────────────────
  frontend-ci:
    name: Frontend Lint + Typecheck + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  # ────────────────────────────────────────────
  # GATE: só roda CD se backend + frontend passaram
  # ────────────────────────────────────────────
  ci-passed:
    name: CI Gate
    needs: [backend-ci, frontend-ci]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "✅ CI passed — backend + frontend OK"

  # ────────────────────────────────────────────
  # CD: Build Docker images e push para GHCR
  # Só roda na main, após CI passar
  # ────────────────────────────────────────────
  build-and-push:
    name: Build Docker Images
    needs: [ci-passed]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  # CD: Deploy para Hostinger via webhook
  # ────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hostinger Webhook
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠️ HOSTINGER_DEPLOY_WEBHOOK not set. Skipping deploy."
            exit 0
          fi
          echo "🚀 Triggering deployment..."
          curl -X GET "$WEBHOOK_URL"
          echo ""
          echo "✅ Deploy triggered successfully."
