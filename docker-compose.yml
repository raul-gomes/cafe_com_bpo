services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MODE=${MODE:-production}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI}
      - GOOGLE_AUTH_URL=${GOOGLE_AUTH_URL}
      - GOOGLE_TOKEN_URL=${GOOGLE_TOKEN_URL}
      - GOOGLE_USERINFO_URL=${GOOGLE_USERINFO_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - FILE_UPLOAD_MAX_SIZE=${FILE_UPLOAD_MAX_SIZE}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    # Ports are now managed by Nginx gateway
    expose:
      - "8000"
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/tests:/app/tests
      - ./apps/backend/alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/frontend
      target: development
    # Ports are now managed by Nginx gateway
    expose:
      - "3000"
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/index.html:/app/index.html
      - ./apps/frontend/vite.config.ts:/app/vite.config.ts
      - ./apps/frontend/tsconfig.json:/app/tsconfig.json
      - ./apps/frontend/postcss.config.js:/app/postcss.config.js
      - ./apps/frontend/tailwind.config.js:/app/tailwind.config.js
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # Ollama is accessible through Nginx Gateway; host port 11434 removed to avoid conflict
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: ["sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:7b && wait"]

  gateway:
    build:
      context: ./infra
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      pgadmin:
        condition: service_started
      ollama:
        condition: service_started

volumes:
  postgres_data:
  pgadmin_data:
  ollama_data:
